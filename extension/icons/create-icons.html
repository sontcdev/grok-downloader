<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<canvas id="c"></canvas>
<script>
const sizes = [16, 48, 128];
sizes.forEach(size => {
  const canvas = document.getElementById('c');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  
  // Background gradient
  const gradient = ctx.createLinearGradient(0, 0, size, size);
  gradient.addColorStop(0, '#00c853');
  gradient.addColorStop(1, '#00a843');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, size, size);
  
  // Play icon
  ctx.fillStyle = '#000';
  const centerX = size / 2;
  const centerY = size / 2;
  const triangleSize = size * 0.4;
  ctx.beginPath();
  ctx.moveTo(centerX - triangleSize/3, centerY - triangleSize/2);
  ctx.lineTo(centerX - triangleSize/3, centerY + triangleSize/2);
  ctx.lineTo(centerX + triangleSize/2, centerY);
  ctx.closePath();
  ctx.fill();
  
  // Download
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `icon${size}.png`;
    a.click();
  });
});
</script>
</body>
</html>
