<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Video Creator</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <h1>Grok Video Creator</h1>
        
        <div id="updateNotification" class="update-notification" style="display: none;">
            <div class="update-content">
                <strong>Có phiên bản mới!</strong>
                <p class="update-version"></p>
                <div class="update-actions">
                    <button id="downloadUpdate" class="btn-primary btn-small">Tải về</button>
                    <button id="dismissUpdate" class="btn-secondary btn-small">Bỏ qua</button>
                </div>
            </div>
        </div>

        <div class="quick-info">
            <div class="info-row">
                <span class="label">Tốc độ:</span>
                <span class="value" id="speedModeDisplay">Trung bình</span>
            </div>
            <div class="info-row">
                <span class="label">Số prompts:</span>
                <span class="value" id="promptCountDisplay">3</span>
            </div>
            <div class="info-row">
                <span class="label">Phiên bản:</span>
                <span class="value" id="currentVersion">v1.0.0</span>
            </div>
        </div>

        <div class="actions">
            <button id="openSettings" class="btn-primary btn-large">
                <span class="icon">⚙️</span>
                Mở cài đặt
            </button>
        </div>

        <div class="info">
            <h3>Hướng dẫn nhanh:</h3>
            <ol>
                <li>Truy cập <a href="https://grok.com/imagine" target="_blank">grok.com/imagine</a></li>
                <li>Click nút "▶ Start" ở góc dưới phải</li>
                <li>Chọn ảnh và extension sẽ tự động tạo video</li>
            </ol>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
